name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "Missing secret: EC2_SSH_KEY"; missing=1; fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "Missing secret: EC2_HOST"; missing=1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "Missing secret: EC2_USER"; missing=1; fi
          if [ "$missing" -eq 1 ]; then
            echo "Add these in GitHub repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on EC2 (idempotent)
        run: |
          ssh -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'EOF'
          set -e

          # Create project directory if not exists (idempotent)
          mkdir -p ~/cinemora

          cd ~/cinemora

          # Clone repo if not exists, otherwise pull latest changes (idempotent)
          if [ ! -d ".git" ]; then
            git clone "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
          else
            git fetch --all
            git reset --hard origin/main
          fi

          # Backend setup
          cd backend
          npm install
          npx prisma migrate deploy

          # Start or restart backend with PM2 (idempotent)
          if command -v pm2 >/dev/null 2>&1; then
            pm2 startOrReload ecosystem.config.cjs || pm2 restart all || pm2 start src/index.js --name cinemora-backend
          else
            npm install -g pm2
            pm2 start src/index.js --name cinemora-backend
          fi

          # Frontend build
          cd ../frontend
          npm install
          npm run build

          EOF

