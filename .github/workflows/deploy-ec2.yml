name: Deploy to EC2

on:
  workflow_dispatch: # Manual trigger only — disabled on push to avoid SSH key conflicts

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.EC2_SSH_KEY_B64 }}" ] && [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "Missing secret: EC2_SSH_KEY_B64 (preferred) or EC2_SSH_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "Missing secret: EC2_HOST"; missing=1; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "Missing secret: EC2_USER"; missing=1; fi
          if [ "$missing" -eq 1 ]; then
            echo "Add these in GitHub repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Write & validate SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "${EC2_SSH_KEY_B64}" ]; then
            printf '%s' "${EC2_SSH_KEY_B64}" | tr -d '\r' | base64 --decode > ~/.ssh/ec2_key
          else
            python3 -c "import os; p=os.path.expanduser('~/.ssh/ec2_key'); key=os.environ.get('EC2_SSH_KEY','').replace('\\r\\n','\\n').replace('\\r','\\n'); open(p,'w',encoding='utf-8').write(key + ('' if key.endswith('\\n') else '\\n'))"
          fi
          chmod 600 ~/.ssh/ec2_key
          head -n 1 ~/.ssh/ec2_key | grep -Eq '^(-----BEGIN|ssh-|PuTTY-User-Key-File-)' || (echo "Invalid EC2 SSH key format (unexpected header). Use the EC2 .pem PRIVATE key or EC2_SSH_KEY_B64." && exit 1)
          if head -n 1 ~/.ssh/ec2_key | grep -q '^ssh-'; then
            echo "EC2_SSH_KEY looks like a PUBLIC key. Please paste the PRIVATE .pem key into EC2_SSH_KEY (or use EC2_SSH_KEY_B64)."
            exit 1
          fi
          if head -n 1 ~/.ssh/ec2_key | grep -q '^PuTTY-User-Key-File-'; then
            echo "EC2_SSH_KEY looks like a PuTTY .ppk key. Convert to OpenSSH PEM (.pem) and update the secret."
            exit 1
          fi
          ssh-keygen -y -f ~/.ssh/ec2_key >/dev/null

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          # Best-effort: avoid failing job if EC2 is temporarily unreachable.
          for i in 1 2 3; do
            ssh-keyscan -T 10 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts && exit 0
            sleep 3
          done
          echo "Warning: ssh-keyscan failed; continuing with StrictHostKeyChecking=no"

      - name: Deploy on EC2 (idempotent)
        run: |
          ssh -i ~/.ssh/ec2_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" << 'ENDSSH'
          set -e

          # ── 1. Ensure project directory exists (idempotent: mkdir -p) ──────
          mkdir -p ~/cinemora
          cd ~/cinemora

          # ── 2. Clone or pull latest code (idempotent) ─────────────────────
          if [ ! -d ".git" ]; then
            git clone "https://github.com/${{ github.repository }}.git" .
          else
            git fetch --all
            git reset --hard origin/main
          fi

          # ── 3. Write .env files if secrets are provided ───────────────────
          if [ -n "${{ secrets.BACKEND_ENV }}" ]; then
            printf '%s\n' "${{ secrets.BACKEND_ENV }}" > backend/.env
          fi
          if [ -n "${{ secrets.FRONTEND_ENV }}" ]; then
            printf '%s\n' "${{ secrets.FRONTEND_ENV }}" > frontend/.env
          fi

          # ── 4. Run idempotent setup scripts ───────────────────────────────
          chmod +x backend/scripts/setup.sh frontend/scripts/setup.sh

          cd ~/cinemora
          bash backend/scripts/setup.sh

          cd ~/cinemora
          bash frontend/scripts/setup.sh

          echo "✅ Deployment complete."
          ENDSSH

